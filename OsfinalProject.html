<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Memory Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(51, 65, 85, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #8b5cf6;
            --hit: #10b981;
            --hit-bg: rgba(16, 185, 129, 0.1);
            --fault: #ef4444;
            --fault-bg: rgba(239, 68, 68, 0.1);
            --empty: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        /* Sidebar Controls */
        .sidebar {
            width: 320px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input,
        select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button.secondary {
            background: transparent;
            border: 1px solid var(--panel-border);
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Stats Area */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }

        .stat-value.hits {
            color: var(--hit);
        }

        .stat-value.faults {
            color: var(--fault);
        }

        /* Main Visualization Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .top-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .panel-header {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Virtual Memory (Process) */
        .process-pages {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .page-block {
            width: calc(25% - 0.375rem);
            aspect-ratio: 1;
            background: var(--empty);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.875rem;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            transition: all 0.3s;
        }

        .page-block.active {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .fragmentation-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: repeating-linear-gradient(45deg,
                    rgba(239, 68, 68, 0.2),
                    rgba(239, 68, 68, 0.2) 10px,
                    rgba(239, 68, 68, 0.4) 10px,
                    rgba(239, 68, 68, 0.4) 20px);
            height: 0%;
            /* Set via JS */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #fca5a5;
        }

        /* Physical Memory (Frames) */
        .frames-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .frame-block {
            width: 80px;
            height: 100px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px dashed var(--panel-border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .frame-block.filled {
            border-style: solid;
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .frame-block.hit {
            border-color: var(--hit);
            background: var(--hit-bg);
            animation: pulse-hit 0.5s ease;
        }

        .frame-block.fault {
            border-color: var(--fault);
            background: var(--fault-bg);
            animation: shake 0.5s ease;
        }

        .frame-label {
            position: absolute;
            top: -25px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .frame-content {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .frame-meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* Sequence and Logs */
        .sequence-container {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .sequence-item {
            width: 40px;
            height: 40px;
            min-width: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--empty);
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .sequence-item.current {
            background: var(--primary);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .sequence-item.past {
            opacity: 0.5;
        }

        .log-area {
            height: 150px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 1rem;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.875rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .log-entry {
            padding-left: 1rem;
            border-left: 2px solid var(--panel-border);
        }

        .log-entry.hit {
            border-color: var(--hit);
            color: #a7f3d0;
        }

        .log-entry.fault {
            border-color: var(--fault);
            color: #fecaca;
        }

        .log-entry.evict {
            border-color: var(--accent);
            color: #ddd6fe;
        }

        @keyframes pulse-hit {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 15px 5px rgba(16, 185, 129, 0);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-5px);
            }

            40%,
            80% {
                transform: translateX(5px);
            }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <header>
        <h1>Virtual Memory Manager</h1>
        <div style="display: flex; gap: 1rem;">
            <div class="badge" id="frag-badge">Fragmentation: 0 KB</div>
            <div class="badge">Status: <span id="sim-status">Ready</span></div>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="control-group">
                <label>Process Size (KB)</label>
                <input type="number" id="process-size" value="25" min="1" onchange="updateProcessConfig()">
            </div>
            <div class="control-group">
                <label>Page Size (KB)</label>
                <input type="number" id="page-size" value="4" min="1" onchange="updateProcessConfig()">
            </div>

            <hr style="border:0; border-top: 1px solid var(--panel-border); margin: 0.5rem 0;">

            <div class="control-group">
                <label>Physical Frames (RAM)</label>
                <input type="number" id="frame-count" value="3" min="1" max="10" onchange="resetSimulation()">
            </div>
            <div class="control-group">
                <label>Replacement Algorithm</label>
                <select id="algorithm" onchange="resetSimulation()">
                    <option value="LRU">LRU (Least Recently Used)</option>
                    <option value="Optimal">Optimal</option>
                </select>
            </div>
            <div class="control-group">
                <label>Page Reference Sequence (comma separated)</label>
                <input type="text" id="reference-string" value="0, 1, 2, 3, 0, 1, 4, 0, 1, 2, 3, 4"
                    onchange="resetSimulation()">
            </div>

            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <button id="btn-step" onclick="stepSimulation()" style="flex: 1;">Next Step</button>
                <button id="btn-reset" class="secondary" onclick="resetSimulation()" style="flex: 1;">Reset</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div style="font-size: 0.75rem; color: var(--text-muted);">Page Hits</div>
                    <div class="stat-value hits" id="stat-hits">0</div>
                </div>
                <div class="stat-card">
                    <div style="font-size: 0.75rem; color: var(--text-muted);">Page Faults</div>
                    <div class="stat-value faults" id="stat-faults">0</div>
                </div>
            </div>

            <div class="stat-card" style="margin-top: -0.5rem;">
                <div style="font-size: 0.75rem; color: var(--text-muted);">Hit Ratio</div>
                <div class="stat-value" id="stat-ratio" style="color: var(--accent);">0%</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <div class="top-row">
                <!-- Virtual Memory -->
                <div class="panel">
                    <div class="panel-header">
                        Virtual Memory (Process)
                        <span class="badge" id="vm-pages-badge">0 Pages</span>
                    </div>
                    <div class="process-pages" id="vm-container">
                        <!-- Pages generated by JS -->
                    </div>
                </div>

                <!-- Physical Memory -->
                <div class="panel">
                    <div class="panel-header">
                        Physical Memory (RAM)
                        <span class="badge" id="pm-frames-badge">3 Frames</span>
                    </div>
                    <div class="frames-container" id="pm-container" style="margin-top: 2rem;">
                        <!-- Frames generated by JS -->
                    </div>
                </div>
            </div>

            <!-- Sequence and Logs -->
            <div class="panel">
                <div class="panel-header">Reference String</div>
                <div class="sequence-container" id="sequence-container">
                    <!-- Sequence generated by JS -->
                </div>
            </div>

            <div class="panel" style="flex: 1;">
                <div class="panel-header">System Log (Demand Paging)</div>
                <div class="log-area" id="log-area">
                    <div class="log-entry" style="color: var(--text-muted);">Simulation initialized. Waiting for first
                        step...</div>
                </div>
            </div>

        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // State
        let processSize = 25;
        let pageSize = 4;
        let numPages = 0;
        let internalFrag = 0;

        let frameCount = 3;
        let algorithm = 'LRU';
        let sequence = [];

        let currentStep = 0;
        let memoryFrames = []; // Array of { page: number, lastUsed: step, loadedAt: step }
        let hits = 0;
        let faults = 0;

        // Initialization
        window.onload = () => {
            updateProcessConfig();
            resetSimulation();
        };

        function showToast(msg, color = 'var(--text-main)') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.borderLeft = `4px solid ${color}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function log(msg, type = '') {
            const logArea = document.getElementById('log-area');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[Step ${currentStep}] ${msg}`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        // Process & Fragmentation Calculation
        function updateProcessConfig() {
            processSize = parseInt(document.getElementById('process-size').value) || 25;
            pageSize = parseInt(document.getElementById('page-size').value) || 4;

            numPages = Math.ceil(processSize / pageSize);
            internalFrag = (numPages * pageSize) - processSize;

            document.getElementById('frag-badge').textContent = `Fragmentation: ${internalFrag} KB`;
            document.getElementById('vm-pages-badge').textContent = `${numPages} Pages`;

            renderVirtualMemory();
            resetSimulation();
        }

        function renderVirtualMemory() {
            const vmContainer = document.getElementById('vm-container');
            vmContainer.innerHTML = '';

            for (let i = 0; i < numPages; i++) {
                const pageBlock = document.createElement('div');
                pageBlock.className = 'page-block';
                pageBlock.id = `vm-page-${i}`;
                pageBlock.innerHTML = `Page ${i}`;

                // Add fragmentation overlay to the last page if applicable
                if (i === numPages - 1 && internalFrag > 0) {
                    const fragPercent = (internalFrag / pageSize) * 100;
                    const fragDiv = document.createElement('div');
                    fragDiv.className = 'fragmentation-overlay';
                    fragDiv.style.height = `${fragPercent}%`;
                    fragDiv.title = `Internal Fragmentation: ${internalFrag} KB`;
                    pageBlock.appendChild(fragDiv);
                }

                vmContainer.appendChild(pageBlock);
            }
        }

        function resetSimulation() {
            frameCount = parseInt(document.getElementById('frame-count').value) || 3;
            algorithm = document.getElementById('algorithm').value;

            const seqInput = document.getElementById('reference-string').value;
            sequence = seqInput.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));

            // Filter sequence to only include valid pages for the current process
            sequence = sequence.map(p => {
                if (p >= numPages) {
                    showToast(`Warning: Page ${p} requested but process only has ${numPages} pages. Clamping to ${numPages - 1}.`, 'var(--accent)');
                    return numPages - 1;
                }
                return p;
            });

            currentStep = 0;
            memoryFrames = new Array(frameCount).fill(null);
            hits = 0;
            faults = 0;

            document.getElementById('pm-frames-badge').textContent = `${frameCount} Frames`;
            document.getElementById('stat-hits').textContent = hits;
            document.getElementById('stat-faults').textContent = faults;
            document.getElementById('stat-ratio').textContent = '0%';
            document.getElementById('sim-status').textContent = 'Ready';

            document.getElementById('btn-step').disabled = false;

            document.getElementById('log-area').innerHTML = '<div class="log-entry" style="color: var(--text-muted);">Simulation reset. Waiting for first step...</div>';

            renderFrames();
            renderSequence();
            resetVMHighlights();
        }

        function renderFrames() {
            const pmContainer = document.getElementById('pm-container');
            pmContainer.innerHTML = '';

            for (let i = 0; i < frameCount; i++) {
                const frameBlock = document.createElement('div');
                frameBlock.className = 'frame-block';
                frameBlock.id = `pm-frame-${i}`;

                const label = document.createElement('div');
                label.className = 'frame-label';
                label.textContent = `Frame ${i}`;
                frameBlock.appendChild(label);

                const content = document.createElement('div');
                content.className = 'frame-content';

                const meta = document.createElement('div');
                meta.className = 'frame-meta';

                const frameData = memoryFrames[i];
                if (frameData !== null) {
                    frameBlock.classList.add('filled');
                    content.textContent = `P${frameData.page}`;
                    meta.textContent = `Last: ${frameData.lastUsed}`;
                } else {
                    content.textContent = '-';
                }

                frameBlock.appendChild(content);
                frameBlock.appendChild(meta);
                pmContainer.appendChild(frameBlock);
            }
        }

        function renderSequence() {
            const seqContainer = document.getElementById('sequence-container');
            seqContainer.innerHTML = '';

            sequence.forEach((p, idx) => {
                const item = document.createElement('div');
                item.className = 'sequence-item';
                item.id = `seq-item-${idx}`;
                item.textContent = p;

                if (idx < currentStep) item.classList.add('past');
                if (idx === currentStep) item.classList.add('current');

                seqContainer.appendChild(item);
            });
        }

        function resetVMHighlights() {
            document.querySelectorAll('.page-block').forEach(el => el.classList.remove('active'));
        }

        function stepSimulation() {
            if (currentStep >= sequence.length) {
                showToast("Simulation Complete!", "var(--hit)");
                document.getElementById('sim-status').textContent = 'Completed';
                document.getElementById('btn-step').disabled = true;
                return;
            }

            document.getElementById('sim-status').textContent = 'Running';
            const reqPage = sequence[currentStep];

            // Highlight VM
            resetVMHighlights();
            const vmPageEl = document.getElementById(`vm-page-${reqPage}`);
            if (vmPageEl) vmPageEl.classList.add('active');

            // Update sequence UI
            renderSequence();

            // Check if page is in memory
            let frameIndex = memoryFrames.findIndex(f => f !== null && f.page === reqPage);

            if (frameIndex !== -1) {
                // PAGE HIT
                hits++;
                memoryFrames[frameIndex].lastUsed = currentStep;

                renderFrames();
                const frameEl = document.getElementById(`pm-frame-${frameIndex}`);
                frameEl.classList.add('hit');

                log(`Page ${reqPage} found in Frame ${frameIndex} (HIT)`, 'hit');
                showToast(`Page Hit: P${reqPage}`, 'var(--hit)');
            } else {
                // PAGE FAULT
                faults++;

                // Find empty frame
                frameIndex = memoryFrames.findIndex(f => f === null);

                if (frameIndex !== -1) {
                    // Empty frame available
                    memoryFrames[frameIndex] = { page: reqPage, lastUsed: currentStep, loadedAt: currentStep };
                    log(`Page ${reqPage} loaded into empty Frame ${frameIndex} (FAULT)`, 'fault');
                } else {
                    // Need replacement
                    frameIndex = findVictimFrame();
                    const victimPage = memoryFrames[frameIndex].page;

                    memoryFrames[frameIndex] = { page: reqPage, lastUsed: currentStep, loadedAt: currentStep };
                    log(`Page ${reqPage} replacing Page ${victimPage} in Frame ${frameIndex} (FAULT)`, 'evict');
                }

                renderFrames();
                const frameEl = document.getElementById(`pm-frame-${frameIndex}`);
                frameEl.classList.add('fault');

                showToast(`Page Fault: P${reqPage} loaded`, 'var(--fault)');
            }

            // Update Stats
            document.getElementById('stat-hits').textContent = hits;
            document.getElementById('stat-faults').textContent = faults;
            const ratio = ((hits / (hits + faults)) * 100).toFixed(1);
            document.getElementById('stat-ratio').textContent = `${ratio}%`;

            currentStep++;
            renderSequence(); // update current indicator

            if (currentStep >= sequence.length) {
                document.getElementById('sim-status').textContent = 'Completed';
                document.getElementById('btn-step').disabled = true;
            }
        }

        function findVictimFrame() {
            if (algorithm === 'LRU') {
                // Find frame with minimum lastUsed
                let minUsed = Infinity;
                let victimIdx = 0;
                for (let i = 0; i < frameCount; i++) {
                    if (memoryFrames[i].lastUsed < minUsed) {
                        minUsed = memoryFrames[i].lastUsed;
                        victimIdx = i;
                    }
                }
                return victimIdx;
            } else if (algorithm === 'Optimal') {
                // Find frame whose page is used furthest in the future
                let maxFutureDist = -1;
                let victimIdx = 0;

                for (let i = 0; i < frameCount; i++) {
                    const pageInFrame = memoryFrames[i].page;
                    // Find next occurrence in sequence starting from currentStep + 1
                    let nextUse = -1;
                    for (let j = currentStep + 1; j < sequence.length; j++) {
                        if (sequence[j] === pageInFrame) {
                            nextUse = j;
                            break;
                        }
                    }

                    // If never used again, this is the perfect victim
                    if (nextUse === -1) {
                        return i;
                    }

                    if (nextUse > maxFutureDist) {
                        maxFutureDist = nextUse;
                        victimIdx = i;
                    }
                }
                return victimIdx;
            }
            return 0; // fallback
        }

    </script>
</body>

</html>
